<!doctype html>
<html lang="en" data-theme="dark">
  <!-- `head` sorted by https://rviscomi.github.io/capo.js/ -->
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Hermes</title>

    {{content-for "head"}}

    <link integrity="" rel="stylesheet" href="{{rootURL}}assets/vendor.css" />
    <link integrity="" rel="stylesheet" href="{{rootURL}}assets/hermes.css" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="description" content="" />

    <link rel="icon" type="image/png" href="{{rootURL}}images/favicon.png" />

    {{content-for "head-footer"}}
    
    <script>
      // Simple theme toggle functionality
      window.toggleTheme = function() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? null : 'dark';
        
        if (newTheme) {
          html.setAttribute('data-theme', newTheme);
        } else {
          html.removeAttribute('data-theme');
        }
        
        // Store preference
        localStorage.setItem('theme', newTheme || 'light');
        
        // Update toggle button if it exists
        const toggleBtn = document.querySelector('.theme-toggle-manual');
        if (toggleBtn) {
          toggleBtn.textContent = newTheme ? '🌙' : '☀️';
        }
      };
      
      // Initialize theme from localStorage on page load
      (function() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.removeAttribute('data-theme');
        }
      })();
    </script>
  </head>

  <body>
    {{content-for "body"}}

    <script src="{{rootURL}}assets/vendor.js"></script>
    <script src="{{rootURL}}assets/hermes.js"></script>

    {{content-for "body-footer"}}
  </body>
</html>
